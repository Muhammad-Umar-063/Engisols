<?xml version="1.0" encoding="UTF-8"?>
<!--
  1200×1200 canvas; visible content lives in the middle 1200×630 band
  (y=285 to y=915) so qlmanage's square thumbnail can be center-cropped to
  the OG aspect ratio.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#dd3e5e" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#b8294a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0e0e0e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#dd3e5e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#dd3e5e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#dd3e5e" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>

    <!-- Logo gradients (extracted from engisols-logo-nav.svg) -->
    <linearGradient id="ng1" y1="5.18" x2="55.24" y2="5.18" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#643232"/><stop offset="1" stop-color="#cb1037"/></linearGradient>
    <linearGradient id="ng2" x1="330.05" y1="-2" x2="377.34" y2="79.91" xlink:href="#ng1"/>
  </defs>

  <!-- Full canvas base (top + bottom strips will be cropped) -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- Visible safe zone (middle 1200×630 band) -->
  <g>
    <rect x="0" y="285" width="1200" height="630" fill="url(#grid)"/>
    <rect x="0" y="285" width="1200" height="630" fill="url(#glow)"/>

    <!-- Crimson hairlines top + bottom of safe zone -->
    <rect x="0" y="285" width="1200" height="2" fill="url(#hairline)"/>
    <rect x="0" y="913" width="1200" height="2" fill="url(#hairline)"/>

    <!--
      Centered logo. engisols-logo-nav.svg has viewBox 0 0 516.24 122.44 (aspect 4.22:1).
      Render at 600px wide → 142px tall.
      Center horizontally: (1200 - 600) / 2 = 300
      Center vertically inside the 285..915 safe band: 285 + (630 - 142) / 2 = 529
    -->
