    </g>

    <!-- Domain footer wordmark -->
    <text x="600" y="870" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="3" fill="#dd3e5e">ENGISOLS.COM</text>
  </g>
</svg>
